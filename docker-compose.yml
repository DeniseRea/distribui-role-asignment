services:
  usuarios-postgres:
    image: postgres:18-alpine
    container_name: usuarios-postgres
    environment:
      POSTGRES_DB: usuarios
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5433:5432"
    volumes:
      - usuarios-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d usuarios"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  usuarios-postgres-data:
    name: usuarios-postgres-data
